<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Premium Login Glassmorphism Variant 2</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#590df2",
                        "background-light": "#f6f5f8",
                        "background-dark": "#161022",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .mesh-gradient {
            background-color: #161022;
            background-image: 
                radial-gradient(at 0% 0%, rgba(89, 13, 242, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(89, 13, 242, 0.3) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(139, 92, 246, 0.2) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 mesh-gradient">
<!-- Top Navigation / Logo Area -->
<div class="absolute top-0 left-0 w-full flex items-center justify-between p-6">
<div class="flex items-center gap-2">
<div class="bg-primary/20 p-2 rounded-lg border border-primary/30">
<span class="material-symbols-outlined text-primary text-2xl">hexagon</span>
</div>
<span class="text-xl font-bold tracking-tight text-slate-100">Nexus<span class="text-primary">PM</span></span>
</div>
<button class="text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
<!-- Main Login Card -->
<main class="w-full max-w-sm">
<div class="glass-panel rounded-xl p-8 shadow-2xl">
<div class="mb-8 text-center">
<h1 class="text-3xl font-bold text-white mb-2">Welcome Back</h1>
<p class="text-slate-400 text-sm">Elevate your workflow today.</p>
</div>
<!-- Login Form -->
<form class="space-y-5">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300 ml-1">Work Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors text-xl">alternate_email</span>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-4 text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-medium text-slate-300">Password</label>
<a class="text-xs text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors text-xl">lock</span>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-12 text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-4" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow h-px bg-white/10"></div>
<span class="px-4 text-xs text-slate-500 uppercase tracking-widest">Or continue with</span>
<div class="flex-grow h-px bg-white/10"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-white/5 border border-white/10 hover:bg-white/10 rounded-xl py-3 transition-colors">
<img alt="Google" class="w-5 h-5" data-alt="Google logo for social authentication" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCX1QxlBaPax4YiuLNhRkTtdAh8HLH1bqTPjhTyqVOQ-ftxilA5sMWQoesLUQ8agn7sFkHX66UEMIrmZuxChdAOXd-CPBidczjhUtM4u-Yb-RJJvdFJq-SPSl3oiPzknLDu9GApuSU4-0vd3VeTp-wgE2UUJMHJ3WQCCdg33h-EFkLGhPgdhX5gdWQdZVBCrsii2svHhe0f1k_8ii9-5wFoQuGAdNdeyn5P7oElz9V2HovX3qABH3wUw8TCUYuBW-drQQgGSsxISLPF"/>
<span class="text-sm font-medium text-slate-200">Google</span>
</button>
<button class="flex items-center justify-center gap-2 bg-white/5 border border-white/10 hover:bg-white/10 rounded-xl py-3 transition-colors">
<svg aria-hidden="true" class="w-5 h-5 fill-slate-200" data-alt="GitHub octocat logo for authentication" viewbox="0 0 24 24">
<path clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill-rule="evenodd"></path>
</svg>
<span class="text-sm font-medium text-slate-200">GitHub</span>
</button>
</div>
</div>
<div class="mt-8 text-center">
<p class="text-slate-500 text-sm">
                New to Nexus? <a class="text-primary font-bold hover:underline" href="#">Create Account</a>
</p>
</div>
</main>
<!-- Bottom Decorative Elements -->
<div class="mt-auto pb-6 flex flex-col items-center gap-4">
<div class="flex gap-6">
<a class="text-xs text-slate-500 hover:text-slate-300 transition-colors" href="#">Privacy Policy</a>
<a class="text-xs text-slate-500 hover:text-slate-300 transition-colors" href="#">Terms of Service</a>
</div>
<div class="h-1 w-32 bg-slate-800 rounded-full"></div>
</div>
</body></html>
